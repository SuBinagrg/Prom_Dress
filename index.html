<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÉLÉGANCE PROM</title>

<style>
:root {
    --primary: #4c1d95;
    --accent: #f472b6;
    --gold: #fbbf24;
    --bg: #faf5ff;
    --card-bg: #ffffff;
}

body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--primary);
    padding-bottom: 100px;
}

header {
    background: linear-gradient(135deg, #4c1d95, #7c3aed);
    color: white;
    padding: 3rem 1rem;
    text-align: center;
}

.container {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 20px;
}

.grid {
    display: grid;
    gap: 1.5rem;
    grid-template-columns: repeat(3, 1fr);
}

.card {
    background: var(--card-bg);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

.card img {
    width: 100%;
    height: 450px;
    object-fit: cover;
}

.content {
    padding: 1.2rem;
    text-align: center;
}

.price {
    color: var(--accent);
    font-size: 1.3rem;
    font-weight: bold;
}

.btn-group {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    justify-content: center;
}

button {
    border: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

.add { background: var(--primary); color: white; }
.remove { background: #fee2e2; color: red; }

.cart-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--primary);
    color: white;
    padding: 1rem 2rem;
    border-radius: 50px;
    display: flex;
    justify-content: space-between;
    width: 90%;
    max-width: 800px;
}

.confirm {
    background: var(--gold);
    padding: 10px 20px;
    border-radius: 20px;
    text-decoration: none;
    color: black;
    font-weight: bold;
}

.grid {
    display: grid;
    gap: 1.5rem;
}

/* Mobile */
@media (max-width: 768px) {
    .grid {
        grid-template-columns: 1fr;
    }
}

/* Tablet */
@media (min-width: 769px) and (max-width: 1024px) {
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* Desktop (YOU WANT 3) */
@media (min-width: 1025px) {
    .grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

</style>
</head>

<body>

<header>
    <h1>ÉLÉGANCE PROM</h1>
    <p>Find Your Perfect Night Look ✨</p>
</header>

<div class="container">
    <div class="grid" id="grid"></div>
</div>

<div class="cart-bar">
    <div id="summary">Cart Empty</div>
    <a href="bill.html" class="confirm">Checkout</a>
</div>

<script>
const dresses = [
 {id:1,name:"Royal Purple Gown",price:180,img:"https://images.unsplash.com/photo-1559034750-cdab70a66b8e?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8cHJvbSUyMGRyZXNzfGVufDB8fDB8fHww"},
 {id:2,name:"Blush Pink Dress",price:150,img:"https://images.unsplash.com/photo-1601653311204-38ac329d790e?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8cHJvbSUyMGRyZXNzfGVufDB8fDB8fHww"},
 {id:3,name:"Classic Black Elegance",price:170,img:"https://images.unsplash.com/photo-1667526466943-dfb50f49a017?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjB8fHByb20lMjBibGFjayUyMGRyZXNzfGVufDB8fDB8fHww"},
 {id:4,name:"Golden Glam Dress",price:220,img:"https://plus.unsplash.com/premium_photo-1664367340562-485591b0ec21?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTd8fHByb20lMjBkcmVzc3xlbnwwfHwwfHx8MA%3D%3D"},
 {id:5,name:"Red Carpet Dress",price:200,img:"https://images.unsplash.com/photo-1678862507513-fbda8f2bf547?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8cHJvbSUyMGRyZXNzfGVufDB8fDB8fHww"},
 {id:6,name:"Satin Gown",price:210,img:"https://plus.unsplash.com/premium_photo-1699389167296-d6e9fc419789?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTN8fHByb20lMjBkcmVzc3xlbnwwfHwwfHx8MA%3D%3D"}
];

let cart = JSON.parse(localStorage.getItem('dressCart')) || {};

function updateUI(){
    let html="";
    dresses.forEach(d=>{
        const qty=cart[d.id]?cart[d.id].qty:0;

        html+=`
        <div class="card">
            <img src="${d.img}">
            <div class="content">
                <h3>${d.name} ${qty>0?`(${qty})`:''}</h3>
                <p class="price">$${d.price}</p>
                <div class="btn-group">
                    <button class="add" onclick="add(${d.id})">Add</button>
                    ${qty>0?`<button class="remove" onclick="remove(${d.id})">Remove</button>`:''}
                </div>
            </div>
        </div>`;
    });

    document.getElementById('grid').innerHTML=html;

    const totalItems=Object.values(cart).reduce((s,i)=>s+i.qty,0);
    const totalPrice=Object.values(cart).reduce((s,i)=>s+i.qty*i.price,0);

    document.getElementById('summary').innerHTML =
        totalItems>0 ? `Items: ${totalItems} | $${totalPrice}` : "Cart Empty";

    localStorage.setItem('dressCart',JSON.stringify(cart));
    localStorage.setItem('finalTotal',totalPrice);
}

function add(id){
    const item=dresses.find(d=>d.id===id);
    cart[id]?cart[id].qty++:cart[id]={...item,qty:1};
    updateUI();
}

function remove(id){
    if(cart[id]){
        cart[id].qty--;
        if(cart[id].qty<=0) delete cart[id];
    }
    updateUI();
}

updateUI();
</script>

</body>
</html>
